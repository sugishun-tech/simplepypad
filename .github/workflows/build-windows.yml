name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pygments

      - name: Build exe
        run: |
          pyinstaller --noconfirm --windowed --onedir --name SimplePyPad --collect-all pygments simplepypad.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimplePyPad-windows
          path: dist/SimplePyPad